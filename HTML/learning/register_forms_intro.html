<!DOCTYPE html>
<html>
    <head>
        <title>Register</title>
    </head>
    <body>
        <div>
        <h2>Sign Up</h2>
        <form action="">
            <div>
                <label for="f_name">First Name:</label>
                <input type="text" name="f_name" id="f_name" placeholder="Enter your first name">
            </div>
            <div>
                <label for="l_name">Last Name:</label>
                <input type="text" name="l_name" id="l_name" placeholder="Enter your last name">
            </div>
            <div>
                <label for="email">E-mail:</label>
                <input type="email" name="email" id="email" placeholder="Enter your E-mail">
            </div>
            <div>
                <label for="dob">Date of Birth:</label>
                <input type="date" name="dob" id="dob">
            </div>
            <div>
                <label for="pwd">Password:</label>
                <input type="password" name="pwd" id="pwd">
            </div>
            <div>
                <p>Select Gender</p>
                <label for="male">Male</label>
                <input type="radio" value="male" id="male" name="gender">
                <label for="female">Female</label>
                <input type="radio" value="female" id="female" name="gender">
                <label for="other">Other</label>
                <input type="radio" value="other" id="other" name="gender">
            </div>
            <div>
                <label>State</label>
                <select>
                    <option value="Kerala">Kerala</option>
                    <option value="Karnataka">Karnataka</option>
                    <option value="Tamilnadu">Tamilnadu</option>
                    <option value="Telungana">Telungana</option>
                    <option value="Andrapredesh">Andrapredesh</option>
                    <option value="Goa">Goa/option>
                </select>
            </div>
            <div>
                <input type="submit" value="Register">
            </div>
        </form>
        </div>
    </body>
</html>
