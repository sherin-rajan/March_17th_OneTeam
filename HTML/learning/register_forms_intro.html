<!DOCTYPE html>
<html>
    <head>
        <title>Register</title>
    </head>
    <body>
        <div>
        <h2>Sign Up</h2>
        <form action="">
            <div>
                <label for="f_name">First Name:</label>
                <input type="text" name="f_name" id="f_name" placeholder="Enter your first name" oninput="validateName()">

            </div>
            <div>

            </div>
            <div>

                <input type="password" name="pwd" id="pwd">
            </div>
            <div>

                <label for="female">Female</label>
                <input type="radio" value="female" id="female" name="gender">
                <label for="other">Other</label>
                <input type="radio" value="other" id="other" name="gender">
            </div>

                    <option value="Tamilnadu">Tamilnadu</option>
                    <option value="Telungana">Telungana</option>
                    <option value="Andrapredesh">Andrapredesh</option>
                    <option value="Goa">Goa/option>
                </select>
            </div>
            <div>
                <input type="submit" value="Register">
            </div>
        </form>
        </div>

    </body>
</html>
