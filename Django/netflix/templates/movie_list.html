<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie List</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color:#141414;
            color:white;
        }

        .navbar{
            background-color:black;
        }

        .movie-card{
            background:#222;
            border:none;
            transition:0.3s;
        }

        .movie-card:hover{
            transform:scale(1.05);
        }

        .movie-card img{
            height:300px;
            object-fit:cover;
        }

        .btn-danger{
            width:100%;
        }

        h2{
            margin-top:30px;
            margin-bottom:20px;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark px-4">
    <a class="navbar-brand text-danger fw-bold fs-3" href="#">NETFLIX</a>

    <div class="ms-auto">
        <input class="form-control d-inline w-auto" type="search" placeholder="Search">
    </div>
</nav>

<div class="container">

    <h2>Movies</h2>

    <!-- Genre Buttons -->
    <div class="mb-4">
        <button class="btn btn-outline-light">All</button>
        <button class="btn btn-outline-light">Action</button>
        <button class="btn btn-outline-light">Comedy</button>
        <button class="btn btn-outline-light">Drama</button>
        <button class="btn btn-outline-light">Horror</button>
    </div>

    <!-- Movie Cards -->
    <div class="row g-4">

        <div class="col-md-3">
            <div class="card movie-card">
                <img src="https://via.placeholder.com/300x450" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">Avengers</h5>
                    <p>Action | ⭐ 8.6</p>
                    <button class="btn btn-danger">View Details</button>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card movie-card">
                <img src="https://via.placeholder.com/300x450" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">Interstellar</h5>
                    <p>Sci-Fi | ⭐ 8.8</p>
                    <button class="btn btn-danger">View Details</button>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card movie-card">
                <img src="https://via.placeholder.com/300x450" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">Parasite</h5>
                    <p>Thriller | ⭐ 8.5</p>
                    <button class="btn btn-danger">View Details</button>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card movie-card">
                <img src="https://via.placeholder.com/300x450" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">Frozen</h5>
                    <p>Animation | ⭐ 7.8</p>
                    <button class="btn btn-danger">View Details</button>
                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
