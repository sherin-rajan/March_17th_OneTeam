<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone - Home</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color:#141414;
            color:white;
        }

        .navbar{
            background-color:rgba(0,0,0,0.9);
        }

        .hero{
            height:90vh;
            background:url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=1600") center/cover;
            display:flex;
            align-items:center;
        }

        .hero-content{
            margin-left:70px;
            max-width:500px;
        }

        .movie-card{
            background:#222;
            border:none;
            transition:.3s;
        }

        .movie-card:hover{
            transform:scale(1.05);
        }

        .movie-card img{
            height:280px;
            object-fit:cover;
        }

        footer{
            background:black;
            padding:20px;
            margin-top:50px;
            text-align:center;
            color:gray;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark px-4">
    <a class="navbar-brand text-danger fw-bold fs-2" href="#">NETFLIX</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a href="#" class="nav-link">Home</a></li>
            <li class="nav-item"><a href="#" class="nav-link">Movies</a></li>
            <li class="nav-item"><a href="#" class="nav-link">My List</a></li>
            <li class="nav-item"><a href="#" class="nav-link">Login</a></li>
        </ul>
    </div>
</nav>

<!-- Hero Banner -->
<section class="hero">
    <div class="hero-content">
        <h1 class="display-3 fw-bold">Unlimited Movies, TV Shows and More</h1>
        <p class="lead">
            Watch anywhere. Cancel anytime.
        </p>

        <button class="btn btn-danger btn-lg">Watch Now</button>
        <button class="btn btn-outline-light btn-lg">Browse Movies</button>
    </div>
</section>

<div class="container mt-5">

    <!-- Trending -->
    <h2 class="mb-4">Trending Now</h2>

    <div class="row g-4">

        <div class="col-md-3">
            <div class="card movie-card">
                <img src="https://via.placeholder.com/300x450" class="card-img-top">
                <div class="card-body text-center">
                    <h5>Avengers</h5>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card movie-card">
                <img src="https://via.placeholder.com/300x450" class="card-img-top">
                <div class="card-body text-center">
                    <h5>Interstellar</h5>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card movie-card">
                <img src="https://via.placeholder.com/300x450" class="card-img-top">
                <div class="card-body text-center">
                    <h5>Frozen</h5>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card movie-card">
                <img src="https://via.placeholder.com/300x450" class="card-img-top">
                <div class="card-body text-center">
                    <h5>Parasite</h5>
                </div>
            </div>
        </div>

    </div>

    <!-- Popular -->
    <h2 class="mt-5 mb-4">Popular Movies</h2>

    <div class="row g-4">

        <div class="col-md-3">
            <div class="card movie-card">
                <img src="https://via.placeholder.com/300x450" class="card-img-top">
                <div class="card-body text-center">
                    <h5>Joker</h5>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card movie-card">
                <img src="https://via.placeholder.com/300x450" class="card-img-top">
                <div class="card-body text-center">
                    <h5>Inception</h5>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card movie-card">
                <img src="https://via.placeholder.com/300x450" class="card-img-top">
                <div class="card-body text-center">
                    <h5>Avatar</h5>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card movie-card">
                <img src="https://via.placeholder.com/300x450" class="card-img-top">
                <div class="card-body text-center">
                    <h5>Spider-Man</h5>
                </div>
            </div>
        </div>

    </div>

</div>

<footer>
    <p>© 2026 Netflix Clone | Built with Django & Bootstrap</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
