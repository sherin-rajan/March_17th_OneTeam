<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">Student Management</a>

            <div>
                <a href="/" class="btn btn-outline-light me-2">Home</a>
                <a href="/add-details" class="btn btn-light text-primary fw-semibold">Add Student</a>
            </div>
        </div>
    </nav>

    <!-- Form -->
    <div class="container py-5">

        <div class="row justify-content-center">

            <div class="col-md-6">

                <div class="card shadow border-0 rounded-4">

                    <div class="card-header bg-primary text-white text-center">
                        <h3 class="my-2">Add Student Details</h3>
                    </div>

                    <div class="card-body p-4">

                        <form method="post">
                            {% csrf_token %}

                            <div class="mb-3">
                                <label class="form-label fw-semibold">Student Name</label>
                                <input type="text"
                                       class="form-control"
                                       name="name"
                                       placeholder="Enter student name"
                                       required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-semibold">Email Address</label>
                                <input type="email"
                                       class="form-control"
                                       name="email"
                                       placeholder="Enter email"
                                       required>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    Add Student
                                </button>
                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
