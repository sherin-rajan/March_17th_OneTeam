<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Student</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">Student Management</a>

            <div>
                <a href="/" class="btn btn-outline-light me-2">Home</a>
                <a href="/add-details" class="btn btn-light text-primary">Add Student</a>
            </div>
        </div>
    </nav>

    <!-- Update Form -->
    <div class="container py-5">

        <div class="row justify-content-center">

            <div class="col-md-6">

                <div class="card shadow border-0 rounded-4">

                    <div class="card-header bg-warning text-dark text-center">
                        <h3 class="my-2"> Update Student Details</h3>
                    </div>

                    <div class="card-body p-4">

                        <form method="post">
                            {% csrf_token %}

                            <!-- Name -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">
                                    Student Name
                                </label>
                                <input
                                    type="text"
                                    class="form-control"
                                    name="name"
                                    value="{{data.name}}"
                                    required>
                            </div>

                            <!-- Email -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">
                                    Email Address
                                </label>
                                <input
                                    type="email"
                                    class="form-control"
                                    name="email"
                                    value="{{data.email}}"
                                    required>
                            </div>

                            <!-- Status -->
                            <div class="form-check form-switch mb-4">
                                <input
                                    class="form-check-input"
                                    type="checkbox"
                                    id="status"
                                    name="status"
                                    value="True"
                                    {% if data.is_active %}checked{% endif %}>

                                <label class="form-check-label fw-semibold" for="status">
                                    Student is Active
                                </label>
                            </div>

                            <!-- Buttons -->
                            <div class="d-grid gap-2">

                                <button type="submit" class="btn btn-warning">
                                     Save Changes
                                </button>

                                <a href="/" class="btn btn-outline-secondary">
                                    ← Back
                                </a>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
