<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.3.0/css/all.min.css">

</head>

<body class="container-fluid bg-dark-subtle">
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">ToDo</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown"
                aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavDropdown">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/"><i class="fa-regular fa-house"></i>Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/add-task"><i class="fa-solid fa-check text-gray"></i>Add Task</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">

                <div class="card shadow border-danger">
                    <div class="card-body p-5">

                        <h1 class="text-center display-3 fw-bold mb-5">
                            Edit Task
                        </h1>

                        <form method="post">
                            {% csrf_token %}

                            <div class="row align-items-center mb-4">
                                <label for="task" class="col-sm-2 col-form-label fw-semibold">
                                    Task
                                </label>

                                <div class="col-sm-10">
                                    <input type="text" class="form-control" id="task" name="task"
                                        value="{{ my_task.task }}">
                                    <div class="form-text">
                                        Make your changes here
                                    </div>
                                </div>
                            </div>

                            <div class="d-flex justify-content-center align-items-center mb-4">
                                <input class="form-check-input me-2" type="checkbox" id="status" name="status"
                                    value="completed" {% if my_task.is_completed %}checked{% endif %}>

                                <label class="mb-0" for="status">
                                    Is completed
                                </label>
                            </div>

                            <div class="text-center">
                                <button type="submit" class="btn btn-primary px-4">
                                    <i class="fa-solid fa-check text-success text-white"></i> Save Changes
                                </button>
                            </div>

                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
